<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Gear icon -->
  <g transform="translate(115, 215)" fill="none" stroke="#e94560" stroke-width="4" opacity="0.9">
    <!-- Outer gear teeth -->
    <path d="M0,-45 L8,-42 L10,-35 L18,-33 L24,-40 L32,-35 L28,-27 L33,-20 L42,-18 L42,-8 L35,-5 L35,3 L42,10 L40,20 L32,18 L27,25 L32,33 L24,38 L18,32 L10,35 L8,42 L0,45 L-8,42 L-10,35 L-18,32 L-24,38 L-32,33 L-27,25 L-32,18 L-40,20 L-42,10 L-35,3 L-35,-5 L-42,-8 L-42,-18 L-33,-20 L-28,-27 L-32,-35 L-24,-40 L-18,-33 L-10,-35 L-8,-42 Z"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="16"/>
  </g>

  <!-- Wrench icon -->
  <g transform="translate(115, 370)" fill="none" stroke="#e94560" stroke-width="3.5" opacity="0.9">
    <path d="M-30,-20 C-30,-32 -20,-40 -8,-40 C0,-40 7,-37 12,-32 L35,0 L28,7 L5,-15 C2,-10 -5,-8 -10,-8 C-22,-8 -30,-16 -30,-20 Z"/>
    <path d="M12,-32 L20,-28 L28,-36 L35,-30 L27,-22 L35,0"/>
    <line x1="-20" y1="-20" x2="-12" y2="-12"/>
  </g>

  <!-- Main title -->
  <text x="220" y="230" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="2">RepairXpert</text>

  <!-- AI badge -->
  <rect x="775" y="195" width="65" height="36" rx="6" fill="#e94560"/>
  <text x="807" y="221" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>

  <!-- Subtitle -->
  <text x="220" y="290" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#a0a0c0" letter-spacing="1">AI-Powered Industrial Fault Diagnosis</text>

  <!-- Divider line -->
  <rect x="220" y="330" width="700" height="2" fill="#e94560" opacity="0.4"/>

  <!-- Stats boxes -->
  <!-- Stat 1: Fault Codes -->
  <rect x="220" y="370" width="220" height="90" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="330" y="405" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#e94560" text-anchor="middle">201</text>
  <text x="330" y="440" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8888aa" text-anchor="middle">Fault Codes</text>

  <!-- Stat 2: Equipment Types -->
  <rect x="460" y="370" width="220" height="90" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="570" y="405" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#e94560" text-anchor="middle">9</text>
  <text x="570" y="440" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8888aa" text-anchor="middle">Equipment Types</text>

  <!-- Stat 3: Parts -->
  <rect x="700" y="370" width="220" height="90" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="810" y="405" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#e94560" text-anchor="middle">500+</text>
  <text x="810" y="440" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8888aa" text-anchor="middle">Parts Catalog</text>

  <!-- Bottom tagline -->
  <text x="220" y="540" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#555577" letter-spacing="3">INDUSTRIAL DIAGNOSTICS PLATFORM</text>

  <!-- URL -->
  <text x="220" y="575" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#e94560" opacity="0.7">indautomation.onrender.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>